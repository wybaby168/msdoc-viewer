name: Deploy demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare site
        run: |
          mkdir -p site/demo site/dist
          cp demo/index.html site/demo/index.html
          cp -R dist/. site/dist/

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="zh-CN">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./demo/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>msdoc-viewer demo</title>
          </head>
          <body>
            <script>location.replace('./demo/')</script>
            <a href="./demo/">进入 demo</a>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
